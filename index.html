<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TYPOCALYPSE — Type to Survive</title>
<meta property="og:title" content="TYPOCALYPSE — Type to Survive">
<meta property="og:description" content="Words fall from the sky. Type them to destroy them. How long can you survive?">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨️</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    color: #e0e0e0;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    overflow: hidden;
    height: 100vh;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: rgba(8,8,15,0.97);
    transition: opacity 0.5s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 {
    font-size: clamp(32px, 6vw, 64px);
    font-weight: 900;
    letter-spacing: 0.15em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #ff4444, #ff8844, #ffcc44);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #overlay .sub { color: rgba(255,255,255,0.3); font-size: 14px; margin-bottom: 40px; letter-spacing: 0.2em; }
  .start-btn {
    padding: 18px 50px;
    border: 1px solid rgba(255,100,50,0.3);
    border-radius: 4px;
    background: rgba(255,100,50,0.06);
    color: rgba(255,200,150,0.8);
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.1em;
  }
  .start-btn:hover {
    background: rgba(255,100,50,0.15);
    border-color: rgba(255,100,50,0.5);
    color: white;
  }

  #game-over {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: rgba(8,8,15,0.95);
  }
  #game-over.show { display: flex; }
  #game-over h2 {
    font-size: 48px; font-weight: 900;
    color: #ff4444; margin-bottom: 16px;
    letter-spacing: 0.1em;
  }
  #game-over .final-score {
    font-size: 72px; font-weight: 200;
    color: #ffcc44; margin-bottom: 8px;
  }
  #game-over .final-stats {
    color: rgba(255,255,255,0.4);
    font-size: 13px; margin-bottom: 40px;
    text-align: center; line-height: 1.8;
  }

  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 16px 24px;
    z-index: 20; pointer-events: none;
    font-size: 13px;
  }
  #hud .score { color: #ffcc44; font-size: 20px; font-weight: 700; }
  #hud .combo { color: #ff8844; font-size: 14px; }
  #hud .level { color: rgba(255,255,255,0.4); }
  #hud .lives { color: #ff4444; font-size: 18px; letter-spacing: 4px; }

  #input-display {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 28px;
    font-weight: 700;
    color: rgba(255,200,100,0.9);
    text-align: center;
    min-width: 200px;
    border-bottom: 2px solid rgba(255,200,100,0.3);
    padding: 8px 16px;
    letter-spacing: 0.05em;
    pointer-events: none;
  }

  /* Death zone line */
  #deathzone {
    position: fixed;
    bottom: 100px;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,50,50,0.3), transparent);
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="overlay">
  <h1>TYPOCALYPSE</h1>
  <div class="sub">TYPE TO SURVIVE</div>
  <button class="start-btn" id="btn-start">START</button>
</div>

<div id="game-over">
  <h2>GAME OVER</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="final-stats" id="final-stats"></div>
  <button class="start-btn" id="btn-restart">RETRY</button>
</div>

<canvas id="c"></canvas>
<div id="hud">
  <div>
    <div class="score" id="score">0</div>
    <div class="combo" id="combo"></div>
  </div>
  <div style="text-align:center">
    <div class="level" id="level">LEVEL 1</div>
  </div>
  <div style="text-align:right">
    <div class="lives" id="lives">♥♥♥</div>
  </div>
</div>
<div id="input-display"></div>
<div id="deathzone"></div>

<script type="module">
import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext@0.0.3'

const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')
const scoreEl = document.getElementById('score')
const comboEl = document.getElementById('combo')
const levelEl = document.getElementById('level')
const livesEl = document.getElementById('lives')
const inputEl = document.getElementById('input-display')
const overlay = document.getElementById('overlay')
const gameOverScreen = document.getElementById('game-over')

// ═══════════════ STATE ═══════════════
let W, H, dpr
let gameActive = false
let score = 0
let combo = 0
let maxCombo = 0
let lives = 3
let level = 1
let wordsDestroyed = 0
let totalTyped = 0
let time = 0
let spawnTimer = 0
let inputBuffer = ''
let particles = []
let fallingWords = []
let screenShake = 0
let flashAlpha = 0

// Audio
let audioCtx = null

// Word pools
const wordsKR = [
  '불', '물', '빛', '별', '달', '해', '눈', '숨', '꿈', '밤',
  '하늘', '바다', '우주', '세계', '시간', '인생', '마음', '사랑', '지구', '미래',
  '소리', '파동', '진동', '공명', '코드', '타입', '파괴', '생존',
  '타이핑', '프로그래밍', '알고리즘', '컴퓨터', '인터넷', '데이터',
  '시뮬레이션', '프레임워크', '아키텍처',
]
const wordsEN = [
  'fire', 'code', 'wave', 'star', 'moon', 'rain', 'void', 'flux',
  'light', 'sound', 'break', 'crash', 'pulse', 'storm', 'drift',
  'typing', 'system', 'cosmic', 'matrix', 'neural', 'signal',
  'quantum', 'entropy', 'gravity', 'photon', 'syntax',
  'resonance', 'algorithm', 'frequency', 'terminal',
  'apocalypse', 'destruction', 'simulation',
]

function getWordPool() {
  // Mix based on level
  const kr = wordsKR.filter(w => w.length <= 1 + Math.floor(level / 2))
  const en = wordsEN.filter(w => w.length <= 3 + level)
  return [...kr, ...en]
}

// ═══════════════ AUDIO ═══════════════
function initAudio() {
  if (audioCtx) return
  audioCtx = new (window.AudioContext || window.webkitAudioContext)()
}

function playTypeSound() {
  if (!audioCtx) return
  const now = audioCtx.currentTime
  const osc = audioCtx.createOscillator()
  const g = audioCtx.createGain()
  osc.type = 'sine'
  osc.frequency.setValueAtTime(800 + Math.random() * 400, now)
  osc.frequency.exponentialRampToValueAtTime(400, now + 0.05)
  g.gain.setValueAtTime(0.08, now)
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.05)
  osc.connect(g)
  g.connect(audioCtx.destination)
  osc.start(now)
  osc.stop(now + 0.06)
}

function playDestroySound(pitch) {
  if (!audioCtx) return
  const now = audioCtx.currentTime
  // Punchy hit
  const osc = audioCtx.createOscillator()
  const g = audioCtx.createGain()
  osc.type = 'square'
  osc.frequency.setValueAtTime(200 + pitch * 100, now)
  osc.frequency.exponentialRampToValueAtTime(60, now + 0.15)
  g.gain.setValueAtTime(0.2, now)
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.15)
  osc.connect(g)
  g.connect(audioCtx.destination)
  osc.start(now)
  osc.stop(now + 0.2)
  // Noise burst
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate)
  const d = buf.getChannelData(0)
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1
  const n = audioCtx.createBufferSource()
  n.buffer = buf
  const ng = audioCtx.createGain()
  ng.gain.setValueAtTime(0.1, now)
  ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08)
  const hpf = audioCtx.createBiquadFilter()
  hpf.type = 'highpass'
  hpf.frequency.value = 2000
  n.connect(hpf)
  hpf.connect(ng)
  ng.connect(audioCtx.destination)
  n.start(now)
  n.stop(now + 0.1)
}

function playDamageSound() {
  if (!audioCtx) return
  const now = audioCtx.currentTime
  const osc = audioCtx.createOscillator()
  const g = audioCtx.createGain()
  osc.type = 'sawtooth'
  osc.frequency.setValueAtTime(150, now)
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.4)
  g.gain.setValueAtTime(0.25, now)
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.4)
  osc.connect(g)
  g.connect(audioCtx.destination)
  osc.start(now)
  osc.stop(now + 0.5)
}

function playComboSound(comboLevel) {
  if (!audioCtx) return
  const now = audioCtx.currentTime
  // Rising arpeggio based on combo
  const baseFreq = 300 + comboLevel * 50
  for (let i = 0; i < Math.min(comboLevel, 5); i++) {
    const osc = audioCtx.createOscillator()
    const g = audioCtx.createGain()
    osc.type = 'sine'
    osc.frequency.value = baseFreq * (1 + i * 0.25)
    g.gain.setValueAtTime(0, now + i * 0.04)
    g.gain.linearRampToValueAtTime(0.06, now + i * 0.04 + 0.01)
    g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.15)
    osc.connect(g)
    g.connect(audioCtx.destination)
    osc.start(now + i * 0.04)
    osc.stop(now + i * 0.04 + 0.2)
  }
}

// ═══════════════ PARTICLES ═══════════════
function spawnExplosion(x, y, hue, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2
    const speed = 2 + Math.random() * 6
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 30 + Math.random() * 30,
      maxLife: 60,
      hue: hue + Math.random() * 40 - 20,
      size: 1.5 + Math.random() * 3,
      type: 'circle'
    })
  }
}

function spawnLetterParticles(x, y, text, hue) {
  const chars = [...text]
  for (let i = 0; i < chars.length; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI
    const speed = 3 + Math.random() * 5
    particles.push({
      x: x + i * 14,
      y,
      vx: Math.cos(angle) * speed * (Math.random() > 0.5 ? 1 : -1),
      vy: Math.sin(angle) * speed - 3,
      life: 40 + Math.random() * 20,
      maxLife: 60,
      hue,
      size: 14,
      type: 'letter',
      char: chars[i],
      rotation: 0,
      rotSpeed: (Math.random() - 0.5) * 0.3
    })
  }
}

// ═══════════════ WORD SPAWNING ═══════════════
function spawnWord() {
  const pool = getWordPool()
  const word = pool[Math.floor(Math.random() * pool.length)]
  const fontSize = 20 + Math.floor(Math.random() * 4) * 2
  const font = fontSize + 'px "JetBrains Mono", "Fira Code", monospace'

  ctx.font = font
  const textW = ctx.measureText(word).width
  const x = Math.random() * (W - textW - 60) + 30
  const speed = 0.3 + level * 0.08 + Math.random() * 0.2

  // Assign a hue based on language
  const isKR = /[\u3131-\uD79D]/.test(word)
  const hue = isKR ? 200 + Math.random() * 40 : 30 + Math.random() * 30

  fallingWords.push({
    text: word,
    x, y: -30,
    speed,
    font,
    fontSize,
    width: textW,
    hue,
    alpha: 0, // fade in
    matched: 0, // how many chars matched from start
    destroyed: false,
    points: word.length * 10 * level,
  })
}

// ═══════════════ INPUT MATCHING ═══════════════
function checkMatch() {
  if (inputBuffer.length === 0) return

  // Find best matching word
  let bestMatch = null
  let bestScore = 0

  for (const w of fallingWords) {
    if (w.destroyed) continue
    // Check if input matches the beginning of the word
    if (w.text.startsWith(inputBuffer)) {
      const matchScore = inputBuffer.length / w.text.length
      if (matchScore > bestScore) {
        bestScore = matchScore
        bestMatch = w
      }
    }
  }

  // Update matched count on all words
  for (const w of fallingWords) {
    if (w.destroyed) continue
    if (w.text.startsWith(inputBuffer)) {
      w.matched = inputBuffer.length
    } else {
      w.matched = 0
    }
  }

  if (bestMatch && inputBuffer === bestMatch.text) {
    // DESTROYED!
    destroyWord(bestMatch)
    inputBuffer = ''
    inputEl.textContent = ''
  }
}

function destroyWord(w) {
  w.destroyed = true
  wordsDestroyed++
  combo++
  if (combo > maxCombo) maxCombo = combo

  // Score with combo multiplier
  const multiplier = 1 + Math.floor(combo / 5) * 0.5
  const pts = Math.floor(w.points * multiplier)
  score += pts

  // Effects
  const cx = w.x + w.width / 2
  const cy = w.y
  spawnExplosion(cx, cy, w.hue, 12 + combo * 2)
  spawnLetterParticles(w.x, w.y, w.text, w.hue)
  playDestroySound(w.text.length)
  if (combo > 1) playComboSound(combo)
  screenShake = 3 + Math.min(combo, 10)
  flashAlpha = 0.08

  // Level up every 10 words
  if (wordsDestroyed % 10 === 0) {
    level++
    levelEl.textContent = 'LEVEL ' + level
    flashAlpha = 0.15
  }

  updateHUD()
}

function wordReachedBottom(w) {
  lives--
  combo = 0
  screenShake = 15
  flashAlpha = 0.2
  playDamageSound()

  // Red particles
  spawnExplosion(w.x + w.width / 2, H - 100, 0, 20)

  if (lives <= 0) {
    gameOver()
  }

  updateHUD()
}

// ═══════════════ GAME FLOW ═══════════════
function startGame() {
  initAudio()
  gameActive = true
  score = 0
  combo = 0
  maxCombo = 0
  lives = 3
  level = 1
  wordsDestroyed = 0
  totalTyped = 0
  time = 0
  spawnTimer = 0
  inputBuffer = ''
  particles = []
  fallingWords = []
  flashAlpha = 0
  screenShake = 0

  overlay.classList.add('hidden')
  gameOverScreen.classList.remove('show')
  inputEl.textContent = ''
  updateHUD()
}

function gameOver() {
  gameActive = false
  document.getElementById('final-score').textContent = score
  document.getElementById('final-stats').innerHTML =
    'Level ' + level + ' · ' + wordsDestroyed + ' words destroyed<br>' +
    'Max combo: ' + maxCombo + 'x · ' + totalTyped + ' keystrokes'
  gameOverScreen.classList.add('show')
}

function updateHUD() {
  scoreEl.textContent = score
  comboEl.textContent = combo > 1 ? combo + 'x COMBO' : ''
  const hearts = '♥'.repeat(Math.max(0, lives)) + '♡'.repeat(Math.max(0, 3 - lives))
  livesEl.textContent = hearts
}

// ═══════════════ UPDATE ═══════════════
function update() {
  if (!gameActive) return

  time += 0.016

  // Spawn words
  const spawnRate = Math.max(0.8, 3.0 - level * 0.15)
  spawnTimer += 0.016
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0
    spawnWord()
    // Extra word at higher levels
    if (level >= 5 && Math.random() < 0.3) spawnWord()
    if (level >= 10 && Math.random() < 0.3) spawnWord()
  }

  // Update falling words
  for (let i = fallingWords.length - 1; i >= 0; i--) {
    const w = fallingWords[i]
    if (w.destroyed) {
      fallingWords.splice(i, 1)
      continue
    }
    w.y += w.speed
    w.alpha = Math.min(1, w.alpha + 0.05)

    // Reached death zone
    if (w.y > H - 110) {
      wordReachedBottom(w)
      fallingWords.splice(i, 1)
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]
    p.x += p.vx
    p.y += p.vy
    p.vy += 0.12 // gravity
    p.vx *= 0.98
    p.life--
    if (p.type === 'letter') p.rotation += p.rotSpeed
    if (p.life <= 0) particles.splice(i, 1)
  }

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.85
  if (flashAlpha > 0) flashAlpha *= 0.9
}

// ═══════════════ RENDER ═══════════════
function render() {
  ctx.clearRect(0, 0, W * dpr, H * dpr)
  ctx.save()
  ctx.scale(dpr, dpr)

  // Screen shake
  if (screenShake > 0.5) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake,
      (Math.random() - 0.5) * screenShake
    )
  }

  // Background
  ctx.fillStyle = '#08080f'
  ctx.fillRect(0, 0, W, H)

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.015)'
  ctx.lineWidth = 0.5
  const gridSize = 40
  for (let gx = 0; gx < W; gx += gridSize) {
    ctx.beginPath()
    ctx.moveTo(gx, 0)
    ctx.lineTo(gx, H)
    ctx.stroke()
  }
  for (let gy = 0; gy < H; gy += gridSize) {
    ctx.beginPath()
    ctx.moveTo(0, gy)
    ctx.lineTo(W, gy)
    ctx.stroke()
  }

  // Death zone glow
  const dzY = H - 110
  const dzGrad = ctx.createLinearGradient(0, dzY - 30, 0, dzY + 10)
  dzGrad.addColorStop(0, 'transparent')
  dzGrad.addColorStop(1, 'rgba(255,30,30,0.04)')
  ctx.fillStyle = dzGrad
  ctx.fillRect(0, dzY - 30, W, 40)

  // Falling words
  for (const w of fallingWords) {
    if (w.destroyed) continue
    ctx.font = w.font
    ctx.textBaseline = 'top'

    // Glow for partially matched
    if (w.matched > 0) {
      const matchedText = w.text.substring(0, w.matched)
      const remainText = w.text.substring(w.matched)
      const matchedW = ctx.measureText(matchedText).width

      // Matched chars — bright
      ctx.fillStyle = 'hsla(' + w.hue + ', 80%, 70%, ' + w.alpha + ')'
      ctx.fillText(matchedText, w.x, w.y)

      // Remaining — dimmer
      ctx.fillStyle = 'hsla(' + w.hue + ', 30%, 50%, ' + (w.alpha * 0.5) + ')'
      ctx.fillText(remainText, w.x + matchedW, w.y)

      // Underline progress
      ctx.fillStyle = 'hsla(' + w.hue + ', 80%, 60%, ' + (w.alpha * 0.6) + ')'
      ctx.fillRect(w.x, w.y + w.fontSize + 2, matchedW, 2)
    } else {
      // Unmatched — default
      const proximity = 1 - Math.max(0, (dzY - w.y)) / dzY
      const r = Math.floor(proximity * 200)
      ctx.fillStyle = 'hsla(' + w.hue + ', 40%, ' + (55 + proximity * 20) + '%, ' + w.alpha + ')'
      ctx.fillText(w.text, w.x, w.y)
    }
  }

  // Particles
  for (const p of particles) {
    const pAlpha = (p.life / p.maxLife)
    if (p.type === 'letter') {
      ctx.save()
      ctx.translate(p.x, p.y)
      ctx.rotate(p.rotation)
      ctx.font = p.size + 'px "JetBrains Mono", monospace'
      ctx.textBaseline = 'middle'
      ctx.fillStyle = 'hsla(' + p.hue + ', 70%, 65%, ' + (pAlpha * 0.7) + ')'
      ctx.fillText(p.char, 0, 0)
      ctx.restore()
    } else {
      ctx.beginPath()
      ctx.arc(p.x, p.y, p.size * pAlpha, 0, Math.PI * 2)
      ctx.fillStyle = 'hsla(' + p.hue + ', 70%, 60%, ' + (pAlpha * 0.6) + ')'
      ctx.fill()
    }
  }

  // Flash effect
  if (flashAlpha > 0.005) {
    ctx.fillStyle = 'rgba(255,255,255,' + flashAlpha + ')'
    ctx.fillRect(0, 0, W, H)
  }

  // Input cursor blink
  if (gameActive) {
    const cursorAlpha = 0.3 + Math.sin(time * 6) * 0.2
    ctx.fillStyle = 'rgba(255,200,100,' + cursorAlpha + ')'
    const inputW = ctx.measureText(inputBuffer).width
    ctx.fillRect(W/2 + inputW/2 + 2, H - 60, 2, 24)
  }

  ctx.restore()
}

// ═══════════════ RESIZE ═══════════════
function resize() {
  dpr = window.devicePixelRatio || 1
  W = window.innerWidth
  H = window.innerHeight
  canvas.width = W * dpr
  canvas.height = H * dpr
}

// ═══════════════ LOOP ═══════════════
function loop() {
  update()
  render()
  requestAnimationFrame(loop)
}

// ═══════════════ INPUT ═══════════════
document.addEventListener('keydown', e => {
  if (!gameActive) return

  if (e.key === 'Backspace') {
    e.preventDefault()
    inputBuffer = inputBuffer.slice(0, -1)
    inputEl.textContent = inputBuffer
    checkMatch()
    return
  }

  if (e.key === 'Escape') {
    inputBuffer = ''
    inputEl.textContent = ''
    for (const w of fallingWords) w.matched = 0
    return
  }

  // Only accept printable characters
  if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault()
    inputBuffer += e.key
    inputEl.textContent = inputBuffer
    totalTyped++
    playTypeSound()
    checkMatch()
  }
})

// Handle IME (Korean input)
let composing = false
document.addEventListener('compositionstart', () => { composing = true })
document.addEventListener('compositionend', e => {
  composing = false
  if (!gameActive) return
  inputBuffer = e.data || ''
  inputEl.textContent = inputBuffer
  totalTyped += inputBuffer.length
  checkMatch()
})

// Hidden input for mobile / IME
const hiddenInput = document.createElement('input')
hiddenInput.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;'
hiddenInput.setAttribute('autocomplete', 'off')
hiddenInput.setAttribute('autocorrect', 'off')
hiddenInput.setAttribute('autocapitalize', 'off')
hiddenInput.setAttribute('spellcheck', 'false')
document.body.appendChild(hiddenInput)

function focusInput() {
  hiddenInput.focus()
  hiddenInput.value = ''
}

hiddenInput.addEventListener('input', e => {
  if (!gameActive || composing) return
  const val = hiddenInput.value
  if (val.length > 0) {
    inputBuffer += val
    inputEl.textContent = inputBuffer
    totalTyped += val.length
    playTypeSound()
    checkMatch()
  }
  hiddenInput.value = ''
})

// ═══════════════ EVENTS ═══════════════
document.getElementById('btn-start').addEventListener('click', () => {
  startGame()
  focusInput()
})

document.getElementById('btn-restart').addEventListener('click', () => {
  startGame()
  focusInput()
})

canvas.addEventListener('click', () => {
  if (gameActive) focusInput()
})

window.addEventListener('resize', resize)

// ═══════════════ INIT ═══════════════
resize()
loop()

</script>
</body>
</html>
